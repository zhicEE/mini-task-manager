{% extends "base.html" %}

{% block title %}
Edit Task
{% endblock %}

{% block content %}

<h1>Edit Task</h1>

<form action="/edit/{{ task.id }}" method="POST">

    <input
        name="title"
        value="{{ task.title }}"
    >

    <input
        name="deadline"
        value="{{ task.deadline }}"
    >

    <button type="submit">
        Save Changes
    </button>

</form>

{% endblock %}
