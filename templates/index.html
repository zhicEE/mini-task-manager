<!DOCTYPE html>
<html>

<head>
    <title>Task Manager</title>
</head>

<body>

<h1>My Task Manager</h1>

<ul>
{% for task in tasks %}
    <li>
        {{ task.title }}
        |
        Deadline: {{ task.deadline }}
        |
        Completed: {{ task.completed }}
    </li>
{% endfor %}
</ul>

</body>

</html>
