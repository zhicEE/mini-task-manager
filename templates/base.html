<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}Task Manager{% endblock %}</title>
</head>

<body>

<h1>My Task Manager</h1>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
         <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}


    {% block content %}
    {% endblock %}

</body>

</html>
